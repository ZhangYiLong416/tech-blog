<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="700" viewBox="0 0 1360 700" role="img" aria-labelledby="title desc">
  <title id="title">公网暴露远程桌面与 Tailscale 接入方式对比</title>
  <desc id="desc">左侧是不建议的公网开放 3389 端口，右侧是通过 Tailnet 连接的推荐方式</desc>
  <rect width="1360" height="700" fill="#f7fafb"/>
  <text x="680" y="56" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="700" fill="#15212b">连接结构：别把 RDP 端口直接放到公网</text>

  <rect x="55" y="100" width="593" height="525" rx="18" fill="#fff" stroke="#ead8d3" stroke-width="2"/>
  <rect x="55" y="100" width="593" height="62" rx="18" fill="#fcf0ed"/>
  <rect x="55" y="144" width="593" height="18" fill="#fcf0ed"/>
  <text x="88" y="140" font-family="Microsoft YaHei, Arial, sans-serif" font-size="23" font-weight="700" fill="#ad3d28">不建议：公网开放 3389</text>
  <rect x="104" y="218" width="172" height="94" rx="13" fill="#f5f7f8" stroke="#cad5dc"/>
  <text x="190" y="260" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="700" fill="#283742">外出设备</text>
  <text x="190" y="286" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#5b6c78">Internet</text>
  <path d="M277 265h104" stroke="#d4533b" stroke-width="4"/>
  <polygon points="382,265 366,256 366,274" fill="#d4533b"/>
  <rect x="389" y="218" width="203" height="94" rx="13" fill="#fcf0ed" stroke="#e3a99e"/>
  <text x="490" y="252" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#ad3d28">路由器端口映射</text>
  <text x="490" y="282" text-anchor="middle" font-family="Consolas, Arial, sans-serif" font-size="18" fill="#ad3d28">TCP 3389</text>
  <path d="M490 313v66" stroke="#d4533b" stroke-width="4"/>
  <polygon points="490,382 481,366 499,366" fill="#d4533b"/>
  <rect x="366" y="391" width="248" height="92" rx="13" fill="#fff4f2" stroke="#e3a99e"/>
  <text x="490" y="428" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#ad3d28">Windows RDP 主机</text>
  <text x="490" y="455" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#6e514b">公网扫描与爆破暴露面更大</text>
  <text x="98" y="550" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#ad3d28">需要公网入口与防火墙维护</text>
  <text x="98" y="580" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#ad3d28">不适合普通家庭用户直接照做</text>

  <rect x="712" y="100" width="593" height="525" rx="18" fill="#fff" stroke="#cee8e1" stroke-width="2"/>
  <rect x="712" y="100" width="593" height="62" rx="18" fill="#eaf7f3"/>
  <rect x="712" y="144" width="593" height="18" fill="#eaf7f3"/>
  <text x="745" y="140" font-family="Microsoft YaHei, Arial, sans-serif" font-size="23" font-weight="700" fill="#087052">推荐：Tailscale Tailnet</text>
  <rect x="752" y="248" width="164" height="94" rx="13" fill="#f5f7f8" stroke="#cad5dc"/>
  <text x="834" y="288" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#283742">外出设备</text>
  <text x="834" y="314" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#5b6c78">Tailscale 在线</text>
  <path d="M917 295h74" stroke="#20a782" stroke-width="4" stroke-dasharray="8 7"/>
  <polygon points="991,295 975,286 975,304" fill="#20a782"/>
  <rect x="998" y="248" width="121" height="94" rx="47" fill="#102f32"/>
  <text x="1058" y="289" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="700" fill="#fff">加密</text>
  <text x="1058" y="316" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#b8ddd4">Tailnet</text>
  <path d="M1120 295h62" stroke="#20a782" stroke-width="4" stroke-dasharray="8 7"/>
  <polygon points="1183,295 1167,286 1167,304" fill="#20a782"/>
  <rect x="1188" y="248" width="92" height="94" rx="13" fill="#eaf7f3" stroke="#9dd8c8"/>
  <text x="1234" y="288" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="700" fill="#087052">家中</text>
  <text x="1234" y="314" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#087052">PC</text>
  <rect x="779" y="418" width="451" height="59" rx="29" fill="#eaf7f3"/>
  <circle cx="814" cy="447" r="9" fill="#20a782"/>
  <text x="841" y="454" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#087052">无需公网 IP，无需路由器端口映射</text>
  <text x="760" y="550" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#344652">仅 Tailnet 中获授权的设备可发起连接</text>
  <text x="760" y="580" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#344652">仍应启用强密码、NLA 与账号安全保护</text>
</svg>
