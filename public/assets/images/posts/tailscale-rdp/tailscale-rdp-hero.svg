<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="810" viewBox="0 0 1440 810" role="img" aria-labelledby="title desc">
  <title id="title">Tailscale 与 Windows 远程桌面连接家中电脑</title>
  <desc id="desc">手机和笔记本通过加密的 Tailnet 连接家中的 Windows 电脑</desc>
  <rect width="1440" height="810" fill="#f4f7fa"/>
  <rect x="0" y="0" width="1440" height="76" fill="#141a22"/>
  <text x="64" y="49" font-family="Microsoft YaHei, Arial, sans-serif" font-size="27" font-weight="700" fill="#fff">Tailscale + Windows 远程桌面</text>
  <text x="1372" y="49" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" fill="#b6c4cf">免费访问家中电脑</text>

  <rect x="62" y="150" width="325" height="510" rx="22" fill="#fff" stroke="#dbe3ea" stroke-width="2"/>
  <text x="96" y="201" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="700" fill="#141a22">外出设备</text>
  <text x="96" y="235" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" fill="#506171">接入同一个 Tailnet</text>
  <rect x="106" y="287" width="119" height="230" rx="19" fill="#182431"/>
  <rect x="113" y="306" width="105" height="185" rx="8" fill="#ebf2f6"/>
  <rect x="126" y="328" width="80" height="48" rx="7" fill="#dbe8ef"/>
  <rect x="126" y="388" width="80" height="12" rx="6" fill="#bfd0d9"/>
  <rect x="126" y="411" width="57" height="12" rx="6" fill="#bfd0d9"/>
  <circle cx="165" cy="504" r="6" fill="#92a6b2"/>
  <text x="111" y="553" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#506171">手机</text>
  <rect x="244" y="335" width="105" height="140" rx="8" fill="#1b2733"/>
  <rect x="252" y="343" width="89" height="120" fill="#ebf2f6"/>
  <path d="M232 486h129l19 17H213z" fill="#647986"/>
  <text x="246" y="553" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#506171">另一台电脑</text>
  <rect x="100" y="591" width="250" height="38" rx="19" fill="#e9f7f4"/>
  <circle cx="124" cy="610" r="8" fill="#20a782"/>
  <text x="143" y="617" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#087052">Tailscale 在线</text>

  <path d="M406 414h92" stroke="#20a782" stroke-width="4" stroke-dasharray="10 10"/>
  <path d="M942 414h93" stroke="#20a782" stroke-width="4" stroke-dasharray="10 10"/>
  <polygon points="497,414 482,405 482,423" fill="#20a782"/>
  <polygon points="1034,414 1019,405 1019,423" fill="#20a782"/>

  <rect x="508" y="285" width="424" height="261" rx="34" fill="#112c30"/>
  <circle cx="720" cy="377" r="48" fill="#20a782"/>
  <path d="M694 377h52M720 351v52" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
  <text x="720" y="457" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="25" font-weight="700" fill="#fff">加密 Tailnet</text>
  <text x="720" y="492" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" fill="#b8ddd4">优先设备直连，无需公网 IP / 端口映射</text>

  <rect x="1053" y="150" width="325" height="510" rx="22" fill="#fff" stroke="#dbe3ea" stroke-width="2"/>
  <text x="1087" y="201" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="700" fill="#141a22">家中主机</text>
  <text x="1087" y="235" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" fill="#506171">Windows 10/11 Pro</text>
  <rect x="1105" y="303" width="219" height="142" rx="10" fill="#172532"/>
  <rect x="1115" y="313" width="199" height="116" fill="#d8ecf4"/>
  <rect x="1127" y="326" width="54" height="48" fill="#1699d5"/>
  <rect x="1190" y="326" width="110" height="13" rx="5" fill="#b2cbd5"/>
  <rect x="1190" y="350" width="84" height="13" rx="5" fill="#b2cbd5"/>
  <rect x="1127" y="389" width="173" height="13" rx="5" fill="#b2cbd5"/>
  <path d="M1192 445v32h-38l-21 17h163l-21-17h-38v-32z" fill="#657a87"/>
  <rect x="1090" y="530" width="257" height="41" rx="20" fill="#e9f7f4"/>
  <circle cx="1116" cy="550" r="8" fill="#20a782"/>
  <text x="1135" y="557" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#087052">远程桌面已启用</text>
  <rect x="1090" y="589" width="257" height="41" rx="20" fill="#fff3dd"/>
  <text x="1113" y="615" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#855600">不暴露公网 3389 端口</text>

  <text x="720" y="726" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#334452">手机或另一台电脑，像在局域网一样使用家中的 Windows 桌面</text>
</svg>
